services:

  postgres:
    image: postgres:16
    container_name: fast_architectury_postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fast-architectury-net

#  mongo:
#    image: mongo:7
#    container_name: fast_architectury_mongo
#    env_file:
#      - .env
#    volumes:
#      - mongo_data:/data/db
#    healthcheck:
#      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 })' | mongosh --username $MONGO_INITDB_ROOT_USERNAME --password $MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --quiet || exit 1"]
#      interval: 15s
#      timeout: 10s
#      retries: 5
#    restart: unless-stopped
#    networks:
#      - fast-architectury-net

  redis:
    image: redis:7-alpine
    container_name: fast_architectury_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fast-architectury-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fast_architectury_rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fast-architectury-net

  minio:
    image: minio/minio
    container_name: fast_architectury_minio
    env_file:
      - .env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - fast-architectury-net

  fastapi:
    image: ghcr.io/xerottin/fastapi-architectury:latest
    container_name: fast_architectury_fastapi
    environment:
      APP_NAME: Zehn-Arch
      APP_VERSION: 1.0.0
      ACCESS_TOKEN_EXPIRE_MINUTES: 600
      SECRET_KEY: ${SECRET_KEY:-mysecretkey}
      ALGORITHM: HS256
      RATE_LIMIT_MAX_REQUESTS: 1000
      RATE_LIMIT_WINDOW_SECONDS: 600
      GZIP_MINIMUM_SIZE: 1
      CORS_MAX_AGE: 3600

      SENTRY_DSN: ${SENTRY_DSN:-}
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-production}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-mysecretkey}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      JWT_REFRESH_TOKEN_EXPIRE_HOURS: 168

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-fast_architectury_admin}
      DB_PASS: ${POSTGRES_PASSWORD:-ping1234}
      DB_NAME: ${POSTGRES_DB:-fast_architectury_db}

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      MINIO_ENDPOINT: minio:9001
      MINIO_PUBLIC_URL: http://localhost:9001
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_STORAGE_REGION: us-east-1
      MINIO_SECURE: False
      MINIO_BUCKET: minio-bucket

      REDIS_URL: redis://redis:6379/0

      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      MONGO_URI: mongodb://root:example@mongo:27017/admin
      MONGO_DB_NAME: fast_architectury
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      bash -c "alembic upgrade head &&
      gunicorn -b 0.0.0.0:8000
      -w 2
      -t 120
      -k uvicorn.workers.UvicornWorker
      main:app
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile -"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - fast-architectury-net

  worker:
    image: ghcr.io/xerottin/fastapi-architectury:latest
    container_name: fast_architectury_worker
    env_file:
      - .env
    command: celery -A worker.celery_app:celery_app worker -l info
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-fast_architectury_admin}
      DB_PASS: ${POSTGRES_PASSWORD:-ping1234}
      DB_NAME: ${POSTGRES_DB:-fast_architectury_db}

      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      MINIO_ENDPOINT: minio:9001
      MINIO_PUBLIC_URL: http://localhost:9001
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_STORAGE_REGION: us-east-1
      MINIO_SECURE: False
      MINIO_BUCKET: minio-bucket

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fast-architectury-net

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:

networks:
  fast-architectury-net:
    driver: bridge